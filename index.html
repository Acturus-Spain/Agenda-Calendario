<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bullet Planner Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --safe-bottom: env(safe-area-inset-bottom); 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            overflow: hidden; /* Evita el rebote elástico no deseado en iOS */
            height: 100vh;
            user-select: none;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        .task-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            scrollbar-width: none; /* Ocultar scrollbar en Firefox */
        }
        .task-area::-webkit-scrollbar { display: none; }

        .bottom-controls {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e2e8f0;
            padding: 1.25rem 1rem calc(1rem + var(--safe-bottom));
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.05);
            z-index: 50;
        }

        .task-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 1.25rem;
            margin-bottom: 0.75rem;
            touch-action: pan-y;
        }

        .task-delete-bg {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 100%;
            background: linear-gradient(90deg, #f87171, #ef4444);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1.5rem;
            color: white;
            border-radius: 1.25rem;
        }

        .task-content-fg {
            position: relative;
            background: white;
            padding: 1rem;
            border: 1px solid #f1f5f9;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { 
            height: 36px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; border-radius: 10px; cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .calendar-day.selected { background: #4f46e5; color: white; font-weight: 700; transform: scale(1.1); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .calendar-day:active { transform: scale(0.9); }
        
        .pending-dot { 
            width: 4px; height: 4px; 
            background: #6366f1; 
            border-radius: 50%; 
            position: absolute; 
            bottom: 4px; 
        }
        .selected .pending-dot { background: white; }

        .summary-container { 
            max-height: 0; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0; 
        }
        .summary-container.open { 
            max-height: 200px; 
            opacity: 1; 
            margin-top: 0.75rem; 
        }

        /* Animaciones de entrada */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="text-slate-900">

    <div class="main-container max-w-md mx-auto">
        <header class="px-6 pt-6 pb-2">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Mis Tareas</h1>
                    <p id="currentDateDisplay" class="text-indigo-600 font-semibold text-sm">Cargando fecha...</p>
                </div>
                <div class="text-right">
                    <span id="taskCounter" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] uppercase font-black tracking-widest">0 Pendientes</span>
                </div>
            </div>
        </header>

        <main class="task-area" id="taskList">
            <!-- El contenido se genera vía JavaScript -->
        </main>

        <div class="bottom-controls">
            <!-- Input de nueva tarea -->
            <div class="flex gap-2 mb-5">
                <div class="flex-1 flex gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                    <input type="text" id="taskInput" placeholder="¿Qué sigue hoy?" 
                        class="flex-1 px-3 py-2 bg-transparent border-none text-sm focus:ring-0 outline-none placeholder:text-slate-400">
                    <input type="time" id="timeInput" 
                        class="w-20 px-1 py-2 bg-white border-none rounded-xl text-xs font-bold text-indigo-600 outline-none text-center shadow-sm">
                </div>
                <button onclick="addTask()" class="bg-indigo-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl active:scale-90 transition-transform shadow-lg shadow-indigo-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round"/></svg>
                </button>
            </div>

            <!-- Calendario dinámico con soporte de gestos -->
            <div id="calendarSwipeArea" class="bg-white rounded-3xl p-4 border border-slate-100 shadow-sm">
                <div class="flex items-center justify-between mb-3 px-1">
                    <span id="calendarMonth" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Mes</span>
                    <div class="flex gap-1.5">
                        <div class="w-1.5 h-1.5 bg-slate-200 rounded-full"></div>
                        <div class="w-4 h-1.5 bg-indigo-400 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-slate-200 rounded-full"></div>
                    </div>
                </div>
                <div class="calendar-grid mb-1 text-[10px] font-bold text-slate-300 text-center uppercase">
                    <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
                </div>
                <div id="calendarBody" class="calendar-grid"></div>
            </div>
        </div>
    </div>

    <script>
        let tasksByDate = JSON.parse(localStorage.getItem('bulletTasks')) || {};
        let currentViewDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];

        // Configuración de vibración para feedback (haptics)
        const haptic = () => { if(window.navigator.vibrate) window.navigator.vibrate(10); };

        window.onload = () => {
            renderCalendar();
            renderTasks();
            setupCalendarSwipes();
            
            // Register dummy Service Worker para modo PWA
            if ('serviceWorker' in navigator) {
                const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });`;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            }
        };

        function saveToStorage() {
            localStorage.setItem('bulletTasks', JSON.stringify(tasksByDate));
            renderCalendar();
        }

        function renderCalendar() {
            const body = document.getElementById('calendarBody');
            const monthDisplay = document.getElementById('calendarMonth');
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            const firstDay = new Date(year, month, 1).getDay();
            const startingDay = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            monthDisplay.innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentViewDate);
            
            let html = '';
            for (let i = 0; i < startingDay; i++) html += `<div class="calendar-day"></div>`;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = dateStr === selectedDateStr;
                const hasPending = tasksByDate[dateStr] && tasksByDate[dateStr].some(t => !t.completed);
                html += `
                    <div onclick="selectDate('${dateStr}')" class="calendar-day ${isSelected ? 'selected' : ''}">
                        ${day}
                        ${hasPending ? '<div class="pending-dot"></div>' : ''}
                    </div>
                `;
            }
            body.innerHTML = html;
        }

        function setupCalendarSwipes() {
            const area = document.getElementById('calendarSwipeArea');
            let startX = 0;
            area.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
            area.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].clientX - startX;
                if (Math.abs(diff) > 60) {
                    currentViewDate.setMonth(currentViewDate.getMonth() + (diff > 0 ? -1 : 1));
                    renderCalendar();
                    haptic();
                }
            }, {passive: true});
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar();
            renderTasks();
            haptic();
        }

        function addTask() {
            const textInput = document.getElementById('taskInput');
            const timeInput = document.getElementById('timeInput');
            if (!textInput.value.trim()) return;

            const newTask = {
                id: Date.now(),
                text: textInput.value.trim(),
                time: timeInput.value || "--:--",
                completed: false,
                summary: ""
            };

            if (!tasksByDate[selectedDateStr]) tasksByDate[selectedDateStr] = [];
            tasksByDate[selectedDateStr].unshift(newTask);
            saveToStorage();
            renderTasks();
            textInput.value = '';
            haptic();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const dayTasks = tasksByDate[selectedDateStr] || [];
            
            document.getElementById('currentDateDisplay').innerText = new Intl.DateTimeFormat('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }).format(new Date(selectedDateStr + "T00:00:00"));
            document.getElementById('taskCounter').innerText = `${dayTasks.filter(t => !t.completed).length} Pendientes`;

            if (dayTasks.length === 0) {
                list.innerHTML = `
                    <div class="py-20 text-center fade-in">
                        <div class="bg-indigo-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round"/></svg>
                        </div>
                        <p class="text-slate-300 font-medium">Todo listo por aquí</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = dayTasks.map((t, index) => `
                <div class="task-wrapper fade-in" style="animation-delay: ${index * 0.05}s" id="wrapper-${t.id}">
                    <div class="task-delete-bg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                    <div class="task-content-fg" 
                         id="task-${t.id}"
                         ontouchstart="handleSwipeStart(event, ${t.id})"
                         ontouchmove="handleSwipeMove(event, ${t.id})"
                         ontouchend="handleSwipeEnd(event, ${t.id})">
                        <div class="flex items-center gap-4">
                            <div onclick="toggleTask(${t.id})" class="w-6 h-6 rounded-full border-2 ${t.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'} flex items-center justify-center transition-all duration-300">
                                ${t.completed ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round"/></svg>' : ''}
                            </div>
                            <div class="flex-1" onclick="toggleSummary(${t.id})">
                                <p class="text-sm font-semibold tracking-tight ${t.completed ? 'line-through text-slate-300' : 'text-slate-700'}">${t.text}</p>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50/50 px-2 py-0.5 rounded-md uppercase">${t.time}</span>
                                    ${t.summary ? '<svg class="w-3 h-3 text-slate-300" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A1 1 0 0111.293 2.707l5 5a1 1 0 01.293.707V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>' : ''}
                                </div>
                            </div>
                        </div>
                        <div id="summary-${t.id}" class="summary-container">
                            <textarea oninput="updateSummary(${t.id}, this.value)" placeholder="Notas adicionales..." 
                                class="w-full p-4 bg-slate-50 border-none rounded-2xl text-xs text-slate-500 outline-none h-24 resize-none shadow-inner">${t.summary || ''}</textarea>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        let touchStartX = 0;
        let currentSwipeId = null;

        function handleSwipeStart(e, id) {
            touchStartX = e.touches[0].clientX;
            currentSwipeId = id;
            const el = document.getElementById(`task-${id}`);
            el.style.transition = 'none';
        }

        function handleSwipeMove(e, id) {
            const diff = e.touches[0].clientX - touchStartX;
            if (diff < 0) { 
                const el = document.getElementById(`task-${id}`);
                // Añadimos resistencia al deslizamiento
                const x = Math.max(diff, -150);
                el.style.transform = `translateX(${x}px)`;
            }
        }

        function handleSwipeEnd(e, id) {
            const el = document.getElementById(`task-${id}`);
            const diff = e.changedTouches[0].clientX - touchStartX;
            
            el.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
            if (diff < -100) { 
                el.style.transform = 'translateX(-100%)';
                haptic();
                setTimeout(() => deleteTask(id), 250);
            } else {
                el.style.transform = 'translateX(0)';
            }
        }

        function toggleTask(id) {
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, completed: !t.completed} : t);
            haptic();
            saveToStorage(); 
            renderTasks();
        }

        function deleteTask(id) {
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].filter(t => t.id !== id);
            saveToStorage(); 
            renderTasks();
        }

        function toggleSummary(id) {
            const el = document.getElementById(`summary-${id}`);
            const isOpen = el.classList.contains('open');
            // Cerrar otros abiertos para mantener limpieza
            document.querySelectorAll('.summary-container').forEach(s => s.classList.remove('open'));
            if(!isOpen) el.classList.add('open');
        }

        function updateSummary(id, val) {
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, summary: val} : t);
            localStorage.setItem('bulletTasks', JSON.stringify(tasksByDate));
            // No re-renderizamos todo para no perder el foco del teclado
        }
    </script>
</body>
</html>
