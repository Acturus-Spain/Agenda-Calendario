<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bullet Planner Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/4f46e5/white?text=BP">

    <link id="manifest-link" rel="manifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --safe-bottom: env(safe-area-inset-bottom); 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        .task-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scrollbar-width: none;
        }
        .task-area::-webkit-scrollbar { display: none; }

        .bottom-controls {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid #e2e8f0;
            padding: 1rem 1rem calc(1rem + var(--safe-bottom));
            box-shadow: 0 -10px 30px -5px rgba(0, 0, 0, 0.05);
            z-index: 50;
        }

        .task-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 1.25rem;
            margin-bottom: 0.75rem;
            touch-action: pan-y;
        }

        .task-content-fg {
            position: relative;
            background: white;
            padding: 1rem;
            border: 1px solid #f1f5f9;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .task-delete-bg {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 100%;
            background: linear-gradient(90deg, #f87171, #ef4444);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1.5rem;
            color: white;
            border-radius: 1.25rem;
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { 
            height: 38px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; border-radius: 12px; cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .calendar-day.selected { background: #4f46e5; color: white; font-weight: 700; transform: scale(1.05); }
        
        .pending-dot { 
            width: 4px; height: 4px; 
            background: #6366f1; 
            border-radius: 50%; 
            position: absolute; 
            bottom: 4px; 
        }

        .summary-container { 
            max-height: 0; 
            overflow: hidden; 
            transition: all 0.3s ease; 
            opacity: 0; 
        }
        .summary-container.open { 
            max-height: 150px; 
            opacity: 1; 
            margin-top: 0.75rem; 
        }

        .install-banner {
            display: none;
            background: #4f46e5;
            color: white;
            padding: 12px;
            border-radius: 16px;
            margin: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900">

    <div class="main-container max-w-md mx-auto">
        <div id="installBanner" class="install-banner" onclick="installPWA()">
            ✨ ¡Instala esta App en tu escritorio! Toca aquí.
        </div>

        <header class="px-6 pt-6 pb-2 flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Mis Tareas</h1>
                <p id="currentDateDisplay" class="text-indigo-600 font-semibold text-sm">Cargando...</p>
            </div>
            <span id="taskCounter" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] uppercase font-black tracking-widest">0</span>
        </header>

        <main class="task-area" id="taskList">
            <!-- Tareas inyectadas por JS -->
        </main>

        <div class="bottom-controls">
            <div class="flex gap-2 mb-4">
                <div class="flex-1 flex gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                    <input type="text" id="taskInput" placeholder="¿Qué sigue?" 
                        class="flex-1 px-3 py-2 bg-transparent border-none text-sm focus:ring-0 outline-none">
                    <input type="time" id="timeInput" 
                        class="w-20 px-1 py-2 bg-white border-none rounded-xl text-xs font-bold text-indigo-600 shadow-sm">
                </div>
                <button onclick="addTask()" class="bg-indigo-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl shadow-lg shadow-indigo-100 active:scale-90 transition-transform">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round"/></svg>
                </button>
            </div>

            <div id="calendarSwipeArea" class="bg-white rounded-3xl p-4 border border-slate-100">
                <div class="flex items-center justify-between mb-3">
                    <span id="calendarMonth" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Mes</span>
                    <div class="flex gap-1">
                        <div class="w-1 h-1 bg-slate-200 rounded-full"></div>
                        <div class="w-3 h-1 bg-indigo-400 rounded-full"></div>
                    </div>
                </div>
                <div class="calendar-grid mb-1 text-[10px] font-bold text-slate-300 text-center uppercase">
                    <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
                </div>
                <div id="calendarBody" class="calendar-grid"></div>
            </div>
        </div>
    </div>

    <script>
        let deferredPrompt;

        // 1. Generar Manifiesto como Data URI
        const manifest = {
            "name": "Bullet Planner Pro",
            "short_name": "BulletPlanner",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f8fafc",
            "theme_color": "#4f46e5",
            "icons": [{
                "src": "https://placehold.co/192x192/4f46e5/white?text=BP",
                "sizes": "192x192",
                "type": "image/png"
            }, {
                "src": "https://placehold.co/512x512/4f46e5/white?text=Planner",
                "sizes": "512x512",
                "type": "image/png"
            }]
        };
        const manifestStr = JSON.stringify(manifest);
        const manifestBlob = new Blob([manifestStr], {type: 'application/json'});
        document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));

        // 2. Registro de Service Worker (desde un Blob para cumplir el requisito de 1 solo archivo)
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => {})));
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                .then(() => console.log("SW Activo"))
                .catch(err => console.log("SW Error", err));
        }

        // 3. Capturar el evento de instalación
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });

        async function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('installBanner').style.display = 'none';
            }
            deferredPrompt = null;
        }

        let tasksByDate = JSON.parse(localStorage.getItem('bulletTasksV2')) || {};
        let currentViewDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];

        const haptic = () => { if(window.navigator.vibrate) window.navigator.vibrate(15); };

        window.onload = () => {
            renderCalendar();
            renderTasks();
            setupCalendarSwipes();
        };

        function saveToStorage() {
            localStorage.setItem('bulletTasksV2', JSON.stringify(tasksByDate));
            renderCalendar();
        }

        function renderCalendar() {
            const body = document.getElementById('calendarBody');
            const monthDisplay = document.getElementById('calendarMonth');
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            const firstDay = new Date(year, month, 1).getDay();
            const startingDay = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            monthDisplay.innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentViewDate);
            
            let html = '';
            for (let i = 0; i < startingDay; i++) html += `<div class="calendar-day"></div>`;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = dateStr === selectedDateStr;
                const hasPending = tasksByDate[dateStr] && tasksByDate[dateStr].some(t => !t.completed);
                html += `
                    <div onclick="selectDate('${dateStr}')" class="calendar-day ${isSelected ? 'selected' : ''}">
                        ${day}
                        ${hasPending ? '<div class="pending-dot"></div>' : ''}
                    </div>
                `;
            }
            body.innerHTML = html;
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar();
            renderTasks();
            haptic();
        }

        function addTask() {
            const textInput = document.getElementById('taskInput');
            const timeInput = document.getElementById('timeInput');
            if (!textInput.value.trim()) return;

            const newTask = {
                id: Date.now(),
                text: textInput.value.trim(),
                time: timeInput.value || "--:--",
                completed: false,
                summary: ""
            };

            if (!tasksByDate[selectedDateStr]) tasksByDate[selectedDateStr] = [];
            tasksByDate[selectedDateStr].unshift(newTask);
            saveToStorage();
            renderTasks();
            textInput.value = '';
            haptic();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const dayTasks = tasksByDate[selectedDateStr] || [];
            
            document.getElementById('currentDateDisplay').innerText = new Intl.DateTimeFormat('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }).format(new Date(selectedDateStr + "T00:00:00"));
            document.getElementById('taskCounter').innerText = dayTasks.filter(t => !t.completed).length;

            if (dayTasks.length === 0) {
                list.innerHTML = `<div class="py-20 text-center opacity-30 text-sm font-medium">No hay tareas para este día</div>`;
                return;
            }

            list.innerHTML = dayTasks.map((t) => `
                <div class="task-wrapper" id="wrapper-${t.id}">
                    <div class="task-delete-bg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg></div>
                    <div class="task-content-fg" 
                         id="task-${t.id}"
                         ontouchstart="handleSwipeStart(event, ${t.id})"
                         ontouchmove="handleSwipeMove(event, ${t.id})"
                         ontouchend="handleSwipeEnd(event, ${t.id})">
                        <div class="flex items-center gap-4">
                            <div onclick="toggleTask(${t.id})" class="w-6 h-6 rounded-full border-2 ${t.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'} flex items-center justify-center">
                                ${t.completed ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>' : ''}
                            </div>
                            <div class="flex-1" onclick="toggleSummary(${t.id})">
                                <p class="text-sm font-semibold ${t.completed ? 'line-through text-slate-300' : 'text-slate-700'}">${t.text}</p>
                                <span class="text-[10px] font-bold text-indigo-400 uppercase">${t.time}</span>
                            </div>
                        </div>
                        <div id="summary-${t.id}" class="summary-container">
                            <textarea oninput="updateSummary(${t.id}, this.value)" placeholder="Notas..." 
                                class="w-full p-3 bg-slate-50 border-none rounded-xl text-xs outline-none h-20 resize-none">${t.summary || ''}</textarea>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        let touchStartX = 0;
        function handleSwipeStart(e, id) { touchStartX = e.touches[0].clientX; document.getElementById(`task-${id}`).style.transition = 'none'; }
        function handleSwipeMove(e, id) {
            const diff = e.touches[0].clientX - touchStartX;
            if (diff < 0) document.getElementById(`task-${id}`).style.transform = `translateX(${Math.max(diff, -100)}px)`;
        }
        function handleSwipeEnd(e, id) {
            const el = document.getElementById(`task-${id}`);
            const diff = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = 'transform 0.3s ease';
            if (diff < -70) { el.style.transform = 'translateX(-100%)'; haptic(); setTimeout(() => deleteTask(id), 200); }
            else { el.style.transform = 'translateX(0)'; }
        }

        function toggleTask(id) { 
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, completed: !t.completed} : t); 
            haptic(); saveToStorage(); renderTasks(); 
        }
        function deleteTask(id) { tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].filter(t => t.id !== id); saveToStorage(); renderTasks(); }
        function toggleSummary(id) { document.getElementById(`summary-${id}`).classList.toggle('open'); }
        function updateSummary(id, val) { 
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, summary: val} : t);
            localStorage.setItem('bulletTasksV2', JSON.stringify(tasksByDate));
        }

        function setupCalendarSwipes() {
            const area = document.getElementById('calendarSwipeArea');
            let startX = 0;
            area.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            area.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].clientX - startX;
                if (Math.abs(diff) > 50) {
                    currentViewDate.setMonth(currentViewDate.getMonth() + (diff > 0 ? -1 : 1));
                    renderCalendar();
                }
            });
        }
    </script>
</body>
</html>
