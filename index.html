<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bullet Planner Pro</title>
    
    <!-- Configuración para modo App (Pantalla completa) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Agenda">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --safe-bottom: env(safe-area-inset-bottom); 
            --primary: #4f46e5;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            overflow: hidden;
            height: 100dvh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding-top: var(--safe-top);
        }

        .task-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: 240px; 
            scrollbar-width: none;
        }
        .task-area::-webkit-scrollbar { display: none; }

        .bottom-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top-left-radius: 2.5rem;
            border-top-right-radius: 2.5rem;
            box-shadow: 0 -15px 40px -10px rgba(0, 0, 0, 0.08);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            transform: translateY(calc(100% - 145px - var(--safe-bottom)));
            padding-bottom: var(--safe-bottom);
        }
        .bottom-drawer.expanded { transform: translateY(0); }

        .drawer-handle-bump {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 24px;
            background: white;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: flex; justify-content: center; align-items: center; gap: 4px;
        }
        .dot { width: 4px; height: 4px; background: #e2e8f0; border-radius: 50%; }

        .input-bar-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px 25px 20px;
        }

        .input-pill {
            flex: 1;
            height: 56px;
            background: #f3f6fb;
            border-radius: 28px;
            padding: 0 6px 0 24px;
            display: flex;
            align-items: center;
            border: 1px solid #eef2f7;
        }

        .time-chip {
            background: white;
            padding: 8px 14px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
        }
        .time-chip span { color: #4f46e5; font-weight: 700; font-size: 15px; }

        .add-button-square {
            width: 56px; 
            height: 56px;
            background: #4f46e5;
            border-radius: 18px; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 20px -4px rgba(79, 70, 229, 0.4);
            flex-shrink: 0;
            transition: transform 0.1s;
        }
        .add-button-square:active { transform: scale(0.92); }

        .task-wrapper {
            position: relative;
            background: white;
            border-radius: 1.5rem;
            margin-bottom: 0.85rem;
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .task-delete-bg {
            position: absolute;
            inset: 0;
            background: #ef4444;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 2rem;
            color: white;
            z-index: 1;
        }

        .task-content-fg {
            position: relative;
            background: white;
            padding: 1.2rem;
            z-index: 2;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .details-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: white;
            z-index: 2;
            position: relative;
        }
        .task-wrapper.open .details-panel {
            max-height: 200px;
            padding: 0 1.2rem 1.2rem 1.2rem;
        }

        #installBanner {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: white;
            z-index: 1000;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef2f7;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateY(-150%);
            transition: transform 0.5s cubic-bezier(0.17, 0.84, 0.44, 1);
        }
        #installBanner.show { transform: translateY(0); }

        .install-icon {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        #calendarContainer {
            overflow: hidden;
            position: relative;
            width: 100%;
            touch-action: pan-x;
        }
        #calendarWrapper {
            display: flex;
            width: 300%; /* Tres meses (Previo, Actual, Siguiente) pegados */
            transform: translateX(-33.33%); /* Empezamos en el centro */
            will-change: transform;
        }
        .calendar-month-slide {
            width: 33.33%;
            flex-shrink: 0;
        }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-day { 
            height: 46px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem; border-radius: 14px; cursor: pointer;
            position: relative; font-weight: 600; color: #64748b;
        }
        .calendar-day.selected { 
            background: var(--primary); color: white; font-weight: 800; 
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3); 
        }
        .pending-dot { 
            width: 5px; height: 5px; background: #6366f1; border-radius: 50%; 
            position: absolute; bottom: 6px; 
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="installBanner">
        <div class="install-icon">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v12m0 0l-4-4m4 4l4-4M8 20h8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="flex-1">
            <h4 class="text-sm font-bold text-slate-800">Instalar Mi Agenda</h4>
            <p class="text-[11px] text-slate-500 font-medium">Añádela a tu pantalla de inicio para usarla offline</p>
        </div>
        <button onclick="triggerInstall()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md active:scale-90 transition-transform">Instalar</button>
        <button onclick="hideInstallBanner()" class="text-slate-300 p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>

    <div class="main-container max-w-md mx-auto">
        <header class="px-6 pt-10 pb-4 flex justify-between items-end">
            <div>
                <p id="currentDateDisplay" class="text-indigo-600 font-extrabold text-[11px] uppercase tracking-[0.15em] mb-1">Cargando...</p>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Mi Agenda</h1>
            </div>
            <div id="taskCounter" class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-black shadow-sm">0</div>
        </header>

        <main class="task-area" id="taskList"></main>

        <div id="bottomDrawer" class="bottom-drawer">
            <div class="h-10 w-full flex justify-center items-center" id="drawerHandle">
                <div class="drawer-handle-bump">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

            <div class="input-bar-container">
                <div class="input-pill">
                    <input type="text" id="taskInput" placeholder="Añadir tareas" 
                        class="flex-1 bg-transparent border-none text-[16px] font-semibold focus:ring-0 outline-none placeholder:text-slate-400">
                    <div class="time-chip" onclick="document.getElementById('timeInput').showPicker()">
                        <span id="timeDisplay">12:00</span>
                        <svg class="w-4 h-4 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <input type="time" id="timeInput" class="hidden" onchange="updateTimeDisplay(this.value)">
                    </div>
                </div>
                <button onclick="addTask()" class="add-button-square">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6v12m6-6H6" stroke-width="3.5" stroke-linecap="round"/></svg>
                </button>
            </div>

            <div class="px-6 pb-10">
                <div id="calendarSwipeArea" class="bg-slate-50/70 rounded-[2rem] p-6 border border-slate-100 overflow-hidden">
                    <div class="flex items-center justify-between mb-6">
                        <span id="calendarMonth" class="text-[12px] font-black text-slate-400 uppercase tracking-[0.25em]">MES AÑO</span>
                    </div>
                    <div class="calendar-grid mb-3 text-[10px] font-black text-slate-300 text-center uppercase tracking-widest">
                        <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
                    </div>
                    
                    <div id="calendarContainer">
                        <div id="calendarWrapper">
                            <div id="month-prev" class="calendar-month-slide calendar-grid"></div>
                            <div id="month-curr" class="calendar-month-slide calendar-grid"></div>
                            <div id="month-next" class="calendar-month-slide calendar-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasksByDate = JSON.parse(localStorage.getItem('bulletTasksV10')) || {};
        let currentViewDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];
        
        let deferredPrompt;

        window.onload = () => {
            const now = new Date();
            document.getElementById('timeInput').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            updateTimeDisplay(document.getElementById('timeInput').value);
            renderCalendarCarrousel();
            renderTasks();
            initDrawerGestures();
            initCalendarDraggable();
            
            // Configuración PWA
            setupPWA();
            registerServiceWorker();
        };

        window.addEventListener('beforeinstallprompt', (e) => {
            // Evitar que el navegador muestre el prompt automático
            e.preventDefault();
            // Guardar el evento para dispararlo luego
            deferredPrompt = e;
            
            // Mostrar nuestro banner personalizado solo si no estamos ya instalados
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                setTimeout(() => {
                    document.getElementById('installBanner').classList.add('show');
                }, 2000); // Pequeño retraso para no agobiar al abrir
            }
        });

        function triggerInstall() {
            if (!deferredPrompt) return;
            // Mostrar el prompt nativo
            deferredPrompt.prompt();
            // Esperar a la elección del usuario
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('Usuario aceptó la instalación');
                }
                hideInstallBanner();
                deferredPrompt = null;
            });
        }

        function hideInstallBanner() {
            document.getElementById('installBanner').classList.remove('show');
        }

        function setupPWA() {
            const manifest = {
                "name": "Mi Agenda Bullet Pro",
                "short_name": "MiAgenda",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#f8fafc",
                "description": "Organizador de tareas minimalista y gestual.",
                "theme_color": "#4f46e5",
                "icons": [
                    {
                        "src": "https://placehold.co/192x192/4f46e5/white?text=BP",
                        "sizes": "192x192",
                        "type": "image/png"
                    },
                    {
                        "src": "https://placehold.co/512x512/4f46e5/white?text=BP",
                        "sizes": "512x512",
                        "type": "image/png"
                    }
                ]
            };
            const stringManifest = JSON.stringify(manifest);
            const blob = new Blob([stringManifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);
        }

        function updateTimeDisplay(val) {
            document.getElementById('timeDisplay').innerText = val;
        }

        function renderCalendarCarrousel() {
            const monthDisplay = document.getElementById('calendarMonth');
            monthDisplay.innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentViewDate);

            // Renderizar el mes anterior, actual y siguiente para el carrete
            const prevDate = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() - 1, 1);
            const nextDate = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 1);

            renderMonthHTML('month-prev', prevDate);
            renderMonthHTML('month-curr', currentViewDate);
            renderMonthHTML('month-next', nextDate);
        }

        function renderMonthHTML(elementId, dateObj) {
            const container = document.getElementById(elementId);
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const startingDay = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = '';
            for (let i = 0; i < startingDay; i++) html += `<div class="calendar-day"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = dStr === selectedDateStr;
                const hasPending = tasksByDate[dStr] && tasksByDate[dStr].some(t => !t.completed);
                html += `<div onclick="selectDate('${dStr}')" class="calendar-day ${isSelected ? 'selected' : ''}">${day}${hasPending ? '<div class="pending-dot"></div>' : ''}</div>`;
            }
            container.innerHTML = html;
        }

        function initCalendarDraggable() {
            const container = document.getElementById('calendarContainer');
            const wrapper = document.getElementById('calendarWrapper');
            let startX = 0;
            let currentTranslate = 0;
            let isDragging = false;
            const viewWidth = container.offsetWidth;

            container.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                isDragging = true;
                wrapper.style.transition = 'none';
            }, {passive: true});

            container.addEventListener('touchmove', e => {
                if (!isDragging) return;
                const diff = e.touches[0].clientX - startX;
                // Calculamos el desplazamiento base (-33.33% es el centro) mas el arrastre actual
                const basePercent = -33.3333;
                const movePercent = (diff / viewWidth) * 33.3333;
                wrapper.style.transform = `translateX(${basePercent + movePercent}%)`;
                currentTranslate = diff;
            }, {passive: true});

            container.addEventListener('touchend', e => {
                if (!isDragging) return;
                isDragging = false;
                wrapper.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
                
                const threshold = viewWidth / 3.5;
                if (Math.abs(currentTranslate) > threshold) {
                    if (currentTranslate > 0) {
                        // Mover al anterior
                        wrapper.style.transform = 'translateX(0%)';
                        setTimeout(() => {
                            currentViewDate.setMonth(currentViewDate.getMonth() - 1);
                            resetWrapper(wrapper);
                        }, 300);
                    } else {
                        // Mover al siguiente
                        wrapper.style.transform = 'translateX(-66.66%)';
                        setTimeout(() => {
                            currentViewDate.setMonth(currentViewDate.getMonth() + 1);
                            resetWrapper(wrapper);
                        }, 300);
                    }
                    haptic();
                } else {
                    wrapper.style.transform = 'translateX(-33.33%)';
                }
            });
        }

        function resetWrapper(wrapper) {
            wrapper.style.transition = 'none';
            wrapper.style.transform = 'translateX(-33.33%)';
            renderCalendarCarrousel();
        }

        function initDrawerGestures() {
            const drawer = document.getElementById('bottomDrawer');
            const handle = document.getElementById('drawerHandle');
            let startY = 0;
            handle.addEventListener('touchstart', e => startY = e.touches[0].clientY);
            handle.addEventListener('touchend', e => {
                const deltaY = e.changedTouches[0].clientY - startY;
                if (deltaY < -30) drawer.classList.add('expanded');
                else if (deltaY > 30) drawer.classList.remove('expanded');
                else drawer.classList.toggle('expanded');
                haptic();
            });
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendarCarrousel();
            renderTasks();
            haptic();
        }

        function addTask() {
            const textInput = document.getElementById('taskInput');
            const timeInput = document.getElementById('timeInput');
            if (!textInput.value.trim()) return;
            const newTask = {
                id: Date.now(),
                text: textInput.value.trim(),
                time: timeInput.value || "12:00",
                completed: false,
                notes: ""
            };
            if (!tasksByDate[selectedDateStr]) tasksByDate[selectedDateStr] = [];
            tasksByDate[selectedDateStr].unshift(newTask);
            saveToStorage();
            renderTasks();
            textInput.value = '';
            haptic('heavy');
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const dayTasks = tasksByDate[selectedDateStr] || [];
            const displayDate = new Date(selectedDateStr + "T00:00:00");
            document.getElementById('currentDateDisplay').innerText = new Intl.DateTimeFormat('es-ES', { weekday: 'short', day: 'numeric', month: 'short' }).format(displayDate);
            document.getElementById('taskCounter').innerText = dayTasks.filter(t => !t.completed).length;

            if (dayTasks.length === 0) {
                list.innerHTML = `<div class="py-32 text-center opacity-20 text-sm font-semibold italic">Tu agenda está vacía</div>`;
                return;
            }

            list.innerHTML = dayTasks.map((t) => `
                <div class="task-wrapper" id="wrapper-${t.id}">
                    <div class="task-delete-bg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div class="task-content-fg" 
                         id="task-${t.id}"
                         ontouchstart="handleTaskSwipeStart(event, ${t.id})"
                         ontouchmove="handleTaskSwipeMove(event, ${t.id})"
                         ontouchend="handleTaskSwipeEnd(event, ${t.id})"
                         onclick="toggleDetails(${t.id})">
                        <div class="flex items-center gap-4">
                            <div onclick="event.stopPropagation(); toggleTask(${t.id})" class="w-7 h-7 rounded-full border-2 ${t.completed ? 'bg-indigo-500 border-indigo-500 shadow-md' : 'border-slate-200'} flex items-center justify-center transition-all">
                                ${t.completed ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
                            </div>
                            <div class="flex-1">
                                <p class="text-[17px] font-bold ${t.completed ? 'line-through text-slate-300' : 'text-slate-700'} leading-tight">${t.text}</p>
                                <span class="text-[11px] font-black text-indigo-400 uppercase tracking-widest">${t.time}</span>
                            </div>
                        </div>
                    </div>
                    <div class="details-panel" id="details-${t.id}">
                        <textarea onblur="updateNotes(${t.id}, this.value)" placeholder="Escribe notas aquí..." 
                            class="w-full bg-slate-50 p-4 rounded-2xl border-none text-[14px] text-slate-500 focus:ring-0 outline-none resize-none" rows="4">${t.notes || ''}</textarea>
                    </div>
                </div>
            `).join('');
        }

        let taskTouchStartX = 0;
        function handleTaskSwipeStart(e, id) { 
            taskTouchStartX = e.touches[0].clientX; 
            document.getElementById(`task-${id}`).style.transition = 'none'; 
        }

        function handleTaskSwipeMove(e, id) {
            const diff = e.touches[0].clientX - taskTouchStartX;
            if (diff < 0) {
                // Solo permitimos deslizar hacia la izquierda para borrar
                document.getElementById(`task-${id}`).style.transform = `translateX(${Math.max(diff, -100)}px)`;
            }
        }

        function handleTaskSwipeEnd(e, id) {
            const el = document.getElementById(`task-${id}`);
            const diff = e.changedTouches[0].clientX - taskTouchStartX;
            el.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            if (diff < -80) { 
                el.style.transform = 'translateX(-100%)'; 
                haptic(); 
                setTimeout(() => deleteTask(id), 200); 
            } else { el.style.transform = 'translateX(0)'; }
        }

        function toggleDetails(id) {
            const wrapper = document.getElementById(`wrapper-${id}`);
            const wasOpen = wrapper.classList.contains('open');
            document.querySelectorAll('.task-wrapper').forEach(w => w.classList.remove('open'));
            if (!wasOpen) wrapper.classList.add('open');
            haptic();
        }

        function updateNotes(id, text) {
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, notes: text} : t);
            saveToStorage();
        }

        function toggleTask(id) { 
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, completed: !t.completed} : t); 
            haptic(); saveToStorage(); renderTasks(); 
        }
        
        function deleteTask(id) { 
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].filter(t => t.id !== id); 
            saveToStorage(); renderTasks(); 
        }
        
        function saveToStorage() { 
            localStorage.setItem('bulletTasksV10', JSON.stringify(tasksByDate)); 
            renderCalendarCarrousel(); 
        }

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW failed', err));
            }
        }
    </script>
</body>
</html>
