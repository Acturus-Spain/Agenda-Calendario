<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bullet Planner Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/4f46e5/white?text=BP">

    <link id="manifest-link" rel="manifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --safe-bottom: env(safe-area-inset-bottom); 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            overflow: hidden;
            height: 100dvh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding-top: var(--safe-top);
        }

        .task-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: 120px;
            scrollbar-width: none;
        }
        .task-area::-webkit-scrollbar { display: none; }

        /* Estilos del Drawer Colapsable */
        .bottom-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top-left-radius: 2.5rem;
            border-top-right-radius: 2.5rem;
            box-shadow: 0 -15px 40px -10px rgba(0, 0, 0, 0.1);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.1);
            transform: translateY(calc(100% - 110px - var(--safe-bottom)));
            padding-bottom: var(--safe-bottom);
        }

        .bottom-drawer.expanded {
            transform: translateY(0);
        }

        /* Tirador con bulto y puntos */
        .drawer-handle-container {
            height: 44px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
        }

        .drawer-handle-bump {
            position: absolute;
            top: -15px;
            width: 80px;
            height: 25px;
            background: white;
            border-top-left-radius: 100px;
            border-top-right-radius: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .dot { width: 4px; height: 4px; background: #cbd5e1; border-radius: 50%; }

        .task-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 1.25rem;
            margin-bottom: 0.75rem;
            touch-action: pan-y;
        }

        .task-content-fg {
            position: relative;
            background: white;
            padding: 1rem;
            border: 1px solid #f1f5f9;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .task-delete-bg {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 100%;
            background: linear-gradient(90deg, #f87171, #ef4444);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1.5rem;
            color: white;
            border-radius: 1.25rem;
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { 
            height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }
        .calendar-day.selected { background: #4f46e5; color: white; font-weight: 700; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
        
        .pending-dot { 
            width: 4px; height: 4px; 
            background: #6366f1; 
            border-radius: 50%; 
            position: absolute; 
            bottom: 4px; 
        }

        #calendarContent {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .slide-left { transform: translateX(-20px); opacity: 0; }
        .slide-right { transform: translateX(20px); opacity: 0; }
    </style>
</head>
<body class="text-slate-900">

    <div class="main-container max-w-md mx-auto">
        <header class="px-6 pt-6 pb-2 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Mis Tareas</h1>
                <p id="currentDateDisplay" class="text-indigo-600 font-semibold text-sm">Cargando...</p>
            </div>
            <div id="taskCounter" class="bg-indigo-50 text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full text-xs font-black shadow-sm">0</div>
        </header>

        <main class="task-area" id="taskList">
            <!-- Tareas inyectadas por JS -->
        </main>

        <!-- Drawer colapsable -->
        <div id="bottomDrawer" class="bottom-drawer">
            <div class="drawer-handle-container" id="drawerHandle">
                <div class="drawer-handle-bump">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="px-5 pb-4">
                <!-- Input de Tarea -->
                <div class="flex gap-2 mb-6">
                    <div class="flex-1 flex gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100 shadow-inner">
                        <input type="text" id="taskInput" placeholder="¿Qué sigue?" 
                            class="flex-1 px-3 py-2 bg-transparent border-none text-sm focus:ring-0 outline-none">
                        <input type="time" id="timeInput" 
                            class="w-24 px-1 py-2 bg-white border border-slate-100 rounded-xl text-xs font-bold text-indigo-600 shadow-sm">
                    </div>
                    <button onclick="addTask()" class="bg-indigo-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl shadow-lg active:scale-95 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round"/></svg>
                    </button>
                </div>

                <!-- Calendario -->
                <div id="calendarSwipeArea" class="bg-slate-50/50 rounded-3xl p-4 border border-slate-100">
                    <div class="flex items-center justify-between mb-4">
                        <span id="calendarMonth" class="text-xs font-black text-indigo-900 uppercase tracking-widest opacity-60">MAYO DE 2026</span>
                        <div class="flex gap-1">
                            <button onclick="changeMonth(-1)" class="p-1 hover:bg-slate-200 rounded-lg transition-colors"><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5"/></svg></button>
                            <button onclick="changeMonth(1)" class="p-1 hover:bg-slate-200 rounded-lg transition-colors"><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2.5"/></svg></button>
                        </div>
                    </div>
                    <div class="calendar-grid mb-2 text-[10px] font-bold text-slate-300 text-center uppercase tracking-tighter">
                        <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
                    </div>
                    <div id="calendarContent">
                        <div id="calendarBody" class="calendar-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasksByDate = JSON.parse(localStorage.getItem('bulletTasksV2')) || {};
        let currentViewDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];

        const haptic = () => { if(window.navigator.vibrate) window.navigator.vibrate(15); };

        window.onload = () => {
            renderCalendar();
            renderTasks();
            initDrawerGestures();
            initCalendarSwipes();
        };

        // --- Lógica del Drawer ---
        function initDrawerGestures() {
            const drawer = document.getElementById('bottomDrawer');
            const handle = document.getElementById('drawerHandle');
            let startY = 0;
            let currentTranslateY = 0;

            handle.addEventListener('touchstart', e => {
                startY = e.touches[0].clientY;
                drawer.style.transition = 'none';
            });

            handle.addEventListener('touchmove', e => {
                const deltaY = e.touches[0].clientY - startY;
                if (deltaY < 0 && !drawer.classList.contains('expanded')) {
                    // Moviendo hacia arriba para expandir
                }
            });

            handle.addEventListener('touchend', e => {
                const deltaY = e.changedTouches[0].clientY - startY;
                drawer.style.transition = 'transform 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.1)';
                
                if (deltaY < -50) {
                    drawer.classList.add('expanded');
                } else if (deltaY > 50) {
                    drawer.classList.remove('expanded');
                } else {
                    // Toggle simple si no hay mucho swipe
                    drawer.classList.toggle('expanded');
                }
                haptic();
            });
        }

        // --- Lógica del Calendario ---
        function renderCalendar(direction = '') {
            const body = document.getElementById('calendarBody');
            const content = document.getElementById('calendarContent');
            const monthDisplay = document.getElementById('calendarMonth');
            
            if (direction) {
                content.classList.add(direction === 'left' ? 'slide-left' : 'slide-right');
            }

            setTimeout(() => {
                const year = currentViewDate.getFullYear();
                const month = currentViewDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const startingDay = firstDay === 0 ? 6 : firstDay - 1;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                monthDisplay.innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentViewDate);
                
                let html = '';
                for (let i = 0; i < startingDay; i++) html += `<div class="calendar-day"></div>`;
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const isSelected = dateStr === selectedDateStr;
                    const hasTasks = tasksByDate[dateStr] && tasksByDate[dateStr].length > 0;
                    const hasPending = tasksByDate[dateStr] && tasksByDate[dateStr].some(t => !t.completed);
                    
                    html += `
                        <div onclick="selectDate('${dateStr}')" class="calendar-day ${isSelected ? 'selected' : ''}">
                            ${day}
                            ${hasPending ? '<div class="pending-dot"></div>' : ''}
                        </div>
                    `;
                }
                body.innerHTML = html;
                content.classList.remove('slide-left', 'slide-right');
            }, direction ? 150 : 0);
        }

        function changeMonth(delta) {
            currentViewDate.setMonth(currentViewDate.getMonth() + delta);
            renderCalendar(delta > 0 ? 'left' : 'right');
            haptic();
        }

        function initCalendarSwipes() {
            const area = document.getElementById('calendarSwipeArea');
            let startX = 0;
            area.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            area.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].clientX - startX;
                if (Math.abs(diff) > 60) {
                    changeMonth(diff > 0 ? -1 : 1);
                }
            });
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar();
            renderTasks();
            haptic();
        }

        // --- Lógica de Tareas ---
        function addTask() {
            const textInput = document.getElementById('taskInput');
            const timeInput = document.getElementById('timeInput');
            if (!textInput.value.trim()) return;

            const newTask = {
                id: Date.now(),
                text: textInput.value.trim(),
                time: timeInput.value || new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                completed: false,
                summary: ""
            };

            if (!tasksByDate[selectedDateStr]) tasksByDate[selectedDateStr] = [];
            tasksByDate[selectedDateStr].unshift(newTask);
            saveToStorage();
            renderTasks();
            textInput.value = '';
            haptic();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const dayTasks = tasksByDate[selectedDateStr] || [];
            
            const displayDate = new Date(selectedDateStr + "T00:00:00");
            document.getElementById('currentDateDisplay').innerText = new Intl.DateTimeFormat('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }).format(displayDate);
            document.getElementById('taskCounter').innerText = dayTasks.filter(t => !t.completed).length;

            if (dayTasks.length === 0) {
                list.innerHTML = `<div class="py-32 text-center opacity-20 text-sm font-semibold italic">No hay tareas para este día</div>`;
                return;
            }

            list.innerHTML = dayTasks.map((t) => `
                <div class="task-wrapper" id="wrapper-${t.id}">
                    <div class="task-delete-bg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg></div>
                    <div class="task-content-fg" 
                         id="task-${t.id}"
                         ontouchstart="handleTaskSwipeStart(event, ${t.id})"
                         ontouchmove="handleTaskSwipeMove(event, ${t.id})"
                         ontouchend="handleTaskSwipeEnd(event, ${t.id})">
                        <div class="flex items-center gap-4">
                            <div onclick="toggleTask(${t.id})" class="w-6 h-6 rounded-full border-2 ${t.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'} flex items-center justify-center transition-colors">
                                ${t.completed ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>' : ''}
                            </div>
                            <div class="flex-1">
                                <p class="text-sm font-bold ${t.completed ? 'line-through text-slate-300' : 'text-slate-700'}">${t.text}</p>
                                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-tighter">${t.time}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        let taskTouchStartX = 0;
        function handleTaskSwipeStart(e, id) { taskTouchStartX = e.touches[0].clientX; document.getElementById(`task-${id}`).style.transition = 'none'; }
        function handleTaskSwipeMove(e, id) {
            const diff = e.touches[0].clientX - taskTouchStartX;
            if (diff < 0) document.getElementById(`task-${id}`).style.transform = `translateX(${Math.max(diff, -100)}px)`;
        }
        function handleTaskSwipeEnd(e, id) {
            const el = document.getElementById(`task-${id}`);
            const diff = e.changedTouches[0].clientX - taskTouchStartX;
            el.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            if (diff < -70) { el.style.transform = 'translateX(-100%)'; haptic(); setTimeout(() => deleteTask(id), 200); }
            else { el.style.transform = 'translateX(0)'; }
        }

        function toggleTask(id) { 
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, completed: !t.completed} : t); 
            haptic(); saveToStorage(); renderTasks(); 
        }
        function deleteTask(id) { tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].filter(t => t.id !== id); saveToStorage(); renderTasks(); }
        function saveToStorage() { localStorage.setItem('bulletTasksV2', JSON.stringify(tasksByDate)); renderCalendar(); }
    </script>
</body>
</html>
